<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RB7 Notebook</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <!-- LOGIN SCREEN -->

    <div class="login-screen" id="loginScreen">

        <div class="login-card">

            <h1>RB7 Notebook</h1>
            <p>Your Personal Workspace</p>

            <input type="password"
                id="passwordInput"
                placeholder="Enter Password">

            <button id="loginBtn">
    Access Workspace
</button>

        </div>

    </div>

    <!-- MAIN APP -->

    <div class="app hidden" id="app">

        <!-- SIDEBAR -->

        <aside class="sidebar">

            <div class="logo">
                <i class="fas fa-book"></i>
                <h2>RB7 Notes</h2>
            </div>

            <ul>

                <li onclick="showAll()">
                    <i class="fas fa-home"></i>
                    Dashboard
                </li>

                <li onclick="showFavorites()">
                    <i class="fas fa-star"></i>
                    Favorites
                </li>

                <li onclick="showPinned()">
                    <i class="fas fa-thumbtack"></i>
                    Pinned
                </li>

                <li onclick="showArchive()">
                    <i class="fas fa-box"></i>
                    Archive
                </li>

                <li onclick="showTrash()">
                    <i class="fas fa-trash"></i>
                    Trash
                </li>
<li onclick="logout()">
    🚪 Logout
</li>

            </ul>

        </aside>

        <!-- MAIN CONTENT -->

        <main class="main-content">

            <div class="topbar">

                <div class="search-box">

                    <i class="fas fa-search"></i>

                    <input type="text"
                        id="searchInput"
                        placeholder="Search Notes">

                </div>

                <button class="theme-btn"
                    onclick="toggleTheme()">

                    🌙

                </button>

            </div>

            <div class="stats">

                <div class="stat-card">
                    <h2 id="totalNotes">0</h2>
                    <p>Total Notes</p>
                </div>

                <div class="stat-card">
                    <h2 id="favoriteCount">0</h2>
                    <p>Favorites</p>
                </div>

                <div class="stat-card">
                    <h2 id="subjectCount">0</h2>
                    <p>Subjects</p>
                </div>

            </div>

            <div class="note-form">

                <h2>Create New Note</h2>

                <input type="text"
                    id="noteTitle"
                    placeholder="Note Title">

                <input type="text"
                    id="subjectInput"
                    placeholder="Subject Name">

                <textarea
                    id="noteContent"
                    placeholder="Write your note here..."></textarea>

                <div class="form-buttons">

                    <button onclick="addNote()">
                        Save Note
                    </button>

                    <button onclick="exportBackup()">
                        Export Backup
                    </button>

                </div>

            </div>

            <div id="notesContainer"
                class="notes-grid">

            </div>

        </main>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script src="script.js"></script>
     
</body>

</html>
